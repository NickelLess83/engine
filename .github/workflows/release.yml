name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libglm-dev \
            libgl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Package
        run: |
          mkdir -p dist/engine
          cp build/game/game dist/engine/
          cp -r assets dist/engine/
          tar -czf engine-${{ github.ref_name }}-linux.tar.gz -C dist engine

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            engine-${{ github.ref_name }}-linux.tar.gz
